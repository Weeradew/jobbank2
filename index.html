<!DOCTYPE html>
<html lang="en">
<head>
  <title>Student Job Bank System</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="validate.js"></script>
  <script src="payRateCal.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var myModal = new bootstrap.Modal(document.getElementById('promoModal'));
      myModal.show();
    });
  </script>
</head>
<body>

<div class="modal fade" id="promoModal" tabindex="-1" aria-labelledby="promoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content shadow-2xl">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fs-4" id="promoModalLabel">งานสัมมนาน่าสนใจ ลงทะเบียนด่วน!!!</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4 text-center">
        <img src="images/promo_martech.png" class="img-fluid rounded-3 shadow-lg hover-scale" alt="Data Analytics for MarTech Promotion">
      </div>
    </div>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fs-3" href="index.html">Student Job Bank</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDarkDropdown" aria-controls="navbarNavDarkDropdown" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNavDarkDropdown">
      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle fs-5" href="#" id="navbarDarkDropdownMenuLink" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Job Opportunities
          </a>
          <ul class="dropdown-menu dropdown-menu-dark shadow-xl" aria-labelledby="navbarDarkDropdownMenuLink">
            <li><a class="dropdown-item" href="job1.html">นักศึกษาช่วยสอน</a></li>
            <li><a class="dropdown-item" href="job2.html">ผู้ช่วยวิจัย</a></li>
            <li><a class="dropdown-item" href="job3.html">เจ้าหน้าที่ห้องสมุด</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container container-main">
  <div class="form-container">
    <div class="mb-5">
      <h1 class="fw-bold mb-2">Registration</h1>
      <p class="text-secondary opacity-75">Apply for your preferred job position below.</p>
    </div>
    
    <form action="#" method="post" onsubmit="return validateForm()">
      <div class="row">
        <div class="col-md-12 mb-4">
          <label for="nid" class="form-label">National ID<span class="text-danger ms-1">*</span></label>
          <input type="text" class="form-control" id="nid" name="nid" placeholder="Enter 13 digit ID">
        </div>
        
        <div class="col-md-6 mb-4">
          <label for="fname" class="form-label">First Name<span class="text-danger ms-1">*</span></label>
          <input type="text" class="form-control" id="fname" name="fname" placeholder="First Name">
        </div>
        
        <div class="col-md-6 mb-4">
          <label for="lname" class="form-label">Last Name<span class="text-danger ms-1">*</span></label>
          <input type="text" class="form-control" id="lname" name="lname" placeholder="Last Name">
        </div>
        
        <div class="col-md-12 mb-4 mt-2">
          <label class="form-label d-block mb-3">Gender<span class="text-danger ms-1">*</span></label>
          <div class="d-flex gap-4">
            <div class="form-check custom-radio">
              <input type="radio" class="form-check-input" id="gender1" name="genderRad" value="1">
              <label class="form-check-label ps-1" for="gender1">Male</label>
            </div>
            <div class="form-check custom-radio">
              <input type="radio" class="form-check-input" id="gender2" name="genderRad" value="2">
              <label class="form-check-label ps-1" for="gender2">Female</label>
            </div>
            <div class="form-check custom-radio">
              <input type="radio" class="form-check-input" id="gender3" name="genderRad" value="3">
              <label class="form-check-label ps-1" for="gender3">Other</label>
            </div>
          </div>
        </div>
        
        <div class="col-md-6 mb-4">
          <label for="school" class="form-label">School<span class="text-danger ms-1">*</span></label>
          <select class="form-select" id="school" name="shool">
            <option value="1">School of Science and Technology</option>
            <option value="2">School of Business Administration</option>
            <option value="3">School of Law</option>
            <option value="4">School of Art and Design</option>
          </select>
        </div>
        
        <div class="col-md-6 mb-4">
          <label for="year" class="form-label">Year of Study<span class="text-danger ms-1">*</span></label>
          <select class="form-select" id="year" name="year">
            <option value="1">1st Year (55 THB/hour)</option>
            <option value="2">2nd Year (65 THB/hour)</option>
            <option value="3">3rd Year (75 THB/hour)</option>
            <option value="4">4th Year or Greater (85 THB/hour)</option>
          </select>
        </div>
        
        <div class="col-md-12 mb-5">
          <label for="workDays" class="form-label">Working Days per Week<span class="text-danger ms-1">*</span></label>
          <p class="text-secondary small mb-3 opacity-50">Specify from 1 to 6 days.</p>
          <input type="number" class="form-control" id="workDays" name="workDays" min="1" max="6" placeholder="Example: 5">
        </div>
      </div>
      
      <div class="pt-3">
        <button type="submit" class="btn btn-primary px-5 py-3">Register Now</button>
        <button type="reset" class="btn btn-reset px-4 py-3">Clear Form</button>
      </div>
    </form>
  </div>
</div>

<footer class="text-center py-5 opacity-25">
  <p class="small">&copy; 2026 Student Job Bank System. All rights reserved.</p>
</footer>

</body>
</html>
